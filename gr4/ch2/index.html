<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storage Device Quiz</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: url("assets/bg.png") no-repeat center/cover;
}

.container {
    max-width:800px;
    margin:auto;
    padding:20px;
    text-align:center;
    background: rgba(255,255,255,0.9);
    border-radius:15px;
    margin-top:30px;
}

.hidden { display:none; }

.option {
    padding:12px;
    margin:10px;
    background:#eee;
    border-radius:10px;
    cursor:pointer;
}

.option:hover { background:#ddd; }

.correct { background:#4CAF50 !important; color:white; }
.wrong { background:#f44336 !important; color:white; }

button {
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#007BFF;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

.top {
    display:flex;
    justify-content:space-between;
    font-weight:bold;
}

.logo-screen {
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo-screen img { width:200px; }
</style>
</head>

<body>

<!-- LOGO -->
<div id="logoScreen" class="logo-screen">
<img src="assets/innovine_logo.png" onerror="alert('Logo not found. Check path: assets/innovine_logo.png')">
</div>

<div class="container hidden" id="app">

<div id="intro">
<h2>Storage Device Quiz</h2>
<button onclick="startQuiz()">Start</button>
</div>

<div id="quiz" class="hidden">

<div class="top">
<div id="score">Score:0</div>
<div id="timer">45</div>
</div>

<h3 id="question"></h3>
<div id="options"></div>
<p id="feedback"></p>

<button id="nextBtn" class="hidden" onclick="nextQuestion()">Next</button>

</div>

<div id="result" class="hidden">
<h2>Final Score: <span id="finalScore"></span>/10</h2>
<button onclick="location.reload()">Retry</button>
</div>

</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

// Splash
setTimeout(()=>{
document.getElementById("logoScreen").style.display="none";
document.getElementById("app").classList.remove("hidden");
},5000);

// Questions
const q = [
{q:"What is memory used for?",o:["Games","Store data","Typing","Printing"],a:1,exp:"Stores data"},
{q:"Which is temporary?",o:["ROM","RAM","DVD","HDD"],a:1,exp:"RAM loses data"},
{q:"Permanent memory?",o:["RAM","ROM","Cache","CPU"],a:1,exp:"ROM permanent"},
{q:"Large storage?",o:["RAM","Hard Drive","Mouse","CPU"],a:1,exp:"Hard drive large"},
{q:"Portable storage?",o:["Mouse","Pen Drive","Monitor","Keyboard"],a:1,exp:"Pen drive portable"},
{q:"CPU directly uses?",o:["Primary","Secondary","Cloud","External"],a:0,exp:"Primary memory"},
{q:"4.7GB device?",o:["CD","DVD","RAM","USB"],a:1,exp:"DVD capacity"},
{q:"Non-volatile?",o:["RAM","ROM","Cache","Register"],a:1,exp:"ROM safe"},
{q:"Cannot erase?",o:["CD-R","CD-RW","USB","SSD"],a:0,exp:"CD-R fixed"},
{q:"Fast but small?",o:["Primary","Secondary","Cloud","External"],a:0,exp:"Primary fast"}
];

let i=0,score=0,attempt=0,timer,time=45;

function startQuiz(){
document.getElementById("intro").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
loadQ();
}

function loadQ(){
attempt=0;
time=45;
document.getElementById("nextBtn").classList.add("hidden");
document.getElementById("feedback").innerText="";

startTimer();

document.getElementById("question").innerText=q[i].q;

let optDiv=document.getElementById("options");
optDiv.innerHTML="";

q[i].o.forEach((opt,index)=>{
let div=document.createElement("div");
div.className="option";
div.innerText=opt;
div.onclick=()=>check(index,div);
optDiv.appendChild(div);
});
}

function startTimer(){
clearInterval(timer);
timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText="Time:"+time;
if(time==0){
clearInterval(timer);
showNext();
}
},1000);
}

function check(sel,el){
if(sel===q[i].a){
el.classList.add("correct");
document.getElementById("correctSound").play();
score++;
update();
showNext();
}else{
attempt++;
el.classList.add("wrong");
document.getElementById("wrongSound").play();

if(attempt==2){
document.getElementById("feedback").innerText="Correct: "+q[i].o[q[i].a]+" | "+q[i].exp;
showNext();
}
}
}

function showNext(){
clearInterval(timer);
document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion(){
i++;
if(i<q.length){
loadQ();
}else{
document.getElementById("quiz").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");
document.getElementById("finalScore").innerText=score;
}
}

function update(){
document.getElementById("score").innerText="Score:"+score;
}

</script>

</body>
</html>
