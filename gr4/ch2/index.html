<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storage Device Quiz</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: url("assets/bg.png") no-repeat center/cover;
}

.container {
    max-width:800px;
    margin:auto;
    padding:20px;
    text-align:center;
    background: rgba(255,255,255,0.9);
    border-radius:15px;
    margin-top:30px;
}

.hidden { display:none; }

.option {
    padding:12px;
    margin:10px;
    background:#eee;
    border-radius:10px;
    cursor:pointer;
}

.option:hover { background:#ddd; }

.correct { background:#4CAF50 !important; color:white; }
.wrong { background:#f44336 !important; color:white; }

button {
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#007BFF;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

.top {
    display:flex;
    justify-content:space-between;
    font-weight:bold;
}

.logo-screen {
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo-screen img { width:200px; }
</style>
</head>

<body>

<!-- LOGO SPLASH -->
<div id="logoScreen" class="logo-screen">
<img src="assets/innovine-logo.png">
</div>

<div class="container hidden" id="app">

<!-- INTRO -->
<div id="intro">
<h2>Storage Device Quiz</h2>
<p>Grade 4 | ICT</p>
<button onclick="startQuiz()">Start Quiz</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="hidden">

<div class="top">
<div id="score">Score: 0</div>
<div id="timer">Time: 45</div>
</div>

<h3 id="question"></h3>
<div id="options"></div>
<p id="feedback"></p>

<button id="nextBtn" class="hidden" onclick="nextQuestion()">Next</button>

</div>

<!-- RESULT -->
<div id="result" class="hidden">
<h2>Final Score: <span id="finalScore"></span>/10</h2>
<button onclick="location.reload()">Retry</button>
</div>

</div>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

// LOGO SPLASH (5 sec)
setTimeout(()=>{
document.getElementById("logoScreen").style.display="none";
document.getElementById("app").classList.remove("hidden");
},5000);

// QUESTIONS
const questions = [
{q:"What is computer memory used for?",o:["Playing games","Storing data","Typing","Printing"],a:1,exp:"Memory stores data."},
{q:"Which memory is temporary?",o:["ROM","RAM","DVD","Hard Drive"],a:1,exp:"RAM loses data when power is off."},
{q:"Which memory is permanent?",o:["RAM","ROM","Cache","Register"],a:1,exp:"ROM stores permanent data."},
{q:"Which device has large storage?",o:["RAM","Hard Drive","CPU","Monitor"],a:1,exp:"Hard drive stores large data."},
{q:"Which device is portable?",o:["Keyboard","Pen Drive","Mouse","Speaker"],a:1,exp:"Pen drive is portable."},
{q:"Which memory is directly accessed?",o:["Primary","Secondary","External","Optical"],a:0,exp:"Primary memory is directly accessed."},
{q:"Which stores about 4.7GB?",o:["CD","DVD","Pen Drive","RAM"],a:1,exp:"DVD stores 4.7GB."},
{q:"Which is non-volatile?",o:["RAM","Cache","ROM","Register"],a:2,exp:"ROM keeps data."},
{q:"Which cannot erase data?",o:["CD-R","CD-RW","Pen Drive","Hard Disk"],a:0,exp:"CD-R cannot erase data."},
{q:"Which is fast but small?",o:["Primary","Secondary","Cloud","External"],a:0,exp:"Primary memory is fast but small."}
];

let index=0,score=0,attempt=0,timer,time=45;

// START QUIZ
function startQuiz(){
document.getElementById("intro").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
loadQuestion();
}

// LOAD QUESTION
function loadQuestion(){
attempt=0;
time=45;
document.getElementById("nextBtn").classList.add("hidden");
document.getElementById("feedback").innerText="";

startTimer();

let q=questions[index];
document.getElementById("question").innerText=q.q;

let optionsDiv=document.getElementById("options");
optionsDiv.innerHTML="";

q.o.forEach((opt,i)=>{
let div=document.createElement("div");
div.className="option";
div.innerText=opt;
div.onclick=()=>checkAnswer(i,div);
optionsDiv.appendChild(div);
});
}

// TIMER
function startTimer(){
clearInterval(timer);
timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText="Time: "+time;

if(time===0){
clearInterval(timer);
showNext();
}
},1000);
}

// CHECK ANSWER
function checkAnswer(selected,element){
let q=questions[index];

if(selected===q.a){
element.classList.add("correct");
document.getElementById("correctSound").play();
score++;
updateScore();
showNext();
}else{
attempt++;
element.classList.add("wrong");
document.getElementById("wrongSound").play();

if(attempt===2){
document.getElementById("feedback").innerText=
"Correct: "+q.o[q.a]+" | "+q.exp;
showNext();
}
}
}

// SHOW NEXT BUTTON
function showNext(){
clearInterval(timer);
document.getElementById("nextBtn").classList.remove("hidden");
}

// NEXT QUESTION
function nextQuestion(){
index++;
if(index<questions.length){
loadQuestion();
}else{
document.getElementById("quiz").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");
document.getElementById("finalScore").innerText=score;
}
}

// UPDATE SCORE
function updateScore(){
document.getElementById("score").innerText="Score: "+score;
}

</script>

</body>
</html>
