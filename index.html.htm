<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Even and Odd Sort Game</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f8f9fa;
font-family:Arial;
}

.number{
width:60px;
padding:10px;
margin:5px;
background:#0d6efd;
color:white;
text-align:center;
border-radius:8px;
cursor:grab;
font-size:18px;
}

.box{
min-height:180px;
border:3px dashed #444;
border-radius:10px;
padding:15px;
background:white;
}

#evenBox{
background:#d4edda;
}

#oddBox{
background:#f8d7da;
}

</style>
</head>

<body>

<div class="container text-center mt-4">

<h2>Drag Numbers to Even or Odd Box</h2>

<button class="btn btn-primary mb-3" onclick="generateNumbers()">Generate Numbers</button>

<div id="numbers" class="d-flex justify-content-center flex-wrap"></div>

<div class="row mt-4">

<div class="col">
<h4>Even Numbers</h4>
<div id="evenBox" class="box" ondrop="drop(event,'even')" ondragover="allowDrop(event)"></div>
</div>

<div class="col">
<h4>Odd Numbers</h4>
<div id="oddBox" class="box" ondrop="drop(event,'odd')" ondragover="allowDrop(event)"></div>
</div>

</div>

<h4 class="mt-3" id="message"></h4>

</div>

<script>

let dragged=null;

function generateNumbers(){

let container=document.getElementById("numbers");
container.innerHTML="";

for(let i=0;i<6;i++){

let num=Math.floor(Math.random()*20)+1;

let div=document.createElement("div");
div.className="number";
div.draggable=true;
div.innerText=num;

div.ondragstart=function(){
dragged=this;
}

container.appendChild(div);

}

}

function allowDrop(e){
e.preventDefault();
}

function drop(e,type){

e.preventDefault();

let value=parseInt(dragged.innerText);

let correct=false;

if(type==="even" && value%2===0) correct=true;
if(type==="odd" && value%2!==0) correct=true;

if(correct){

e.target.appendChild(dragged);
document.getElementById("message").innerText="Correct!";

}

else{

document.getElementById("message").innerText="Try Again!";

}

}

</script>

</body>
</html>
